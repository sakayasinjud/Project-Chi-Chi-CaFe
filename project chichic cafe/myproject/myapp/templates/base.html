<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Chic Chic CaFe{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🎨 Custom Style -->
    <style>
        html, body {
            height: 100%;
        }

        body {
            background-image: url('https://thumbs.dreamstime.com/b/aesthetic-coffee-cup-latte-art-textured-background-surrounded-beans-fabric-perfect-cafe-themes-330498059.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            display: flex;
            flex-direction: column;
        }

        /* กล่องเนื้อหา */
        .content-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        /* ทำให้ content ดัน footer ลงล่าง */
        .main-content {
            flex: 1;
        }

        /* ปุ่ม navbar */
        .nav-btn {
            transition: all 0.3s ease;
            border-radius: 20px;
        }

        .nav-btn:hover {
            transform: scale(1.1);
        }

        /* ก้อนเมฆ */
        .cloud-title {
            display: inline-block;
            background: #ffffff;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .cloud-title::before,
        .cloud-title::after {
            content: "";
            position: absolute;
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            top: 8px;
        }

        .cloud-title::before { left: -18px; }
        .cloud-title::after { right: -18px; }

        /* การ์ด */
        .menu-card {
            transition: 0.3s;
            height: 100%;
        }

        .menu-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .menu-card img {
            height: 180px;
            object-fit: cover;
        }

        /* ✅ Footer */
        footer {
            background: rgba(0,0,0,0.8);
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 14px;
        }

        footer span {
            color: #ffc107;
            font-weight: bold;
        }

    </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">☕ Chic Chic CaFe</a>

        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-light btn-sm nav-btn">🏠 หน้าแรก</a>
            <a href="/menu/" class="btn btn-warning btn-sm fw-bold nav-btn">📋 เมนู</a>
            <a href="/about/" class="btn btn-outline-info btn-sm nav-btn">ℹ️ เกี่ยวกับ</a>
        </div>

    </div>
</nav>

<!-- Content -->
<div class="container mt-4 main-content">
    <div class="content-box">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- ✅ Footer -->
<footer>
    © 2026 Chic Chic Cafe | Designed by <span>68079396-ก้องภพ /68079409-ศักยศิลป์ /68079416-นวพล</span> ☕
</footer>

</body>
</html>
