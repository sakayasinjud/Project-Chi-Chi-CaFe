{% extends "base.html" %}

{% block title %}เมนู{% endblock %}

{% block content %}

<h2 class="mb-4">📋 รายการเมนู</h2>

<!-- ค้นหา -->
<form method="GET" class="row g-2 mb-3">
    <div class="col-md-4">
        <input type="text" name="q" class="form-control" placeholder="ค้นหาชื่อ">
    </div>
    <div class="col-md-4">
        <input type="text" name="category" class="form-control" placeholder="ประเภท">
    </div>
    <div class="col-md-4">
        <button class="btn btn-primary">ค้นหา</button>
    </div>
</form>

<a href="/add/" class="btn btn-success mb-3">➕ เพิ่มเมนู</a>

<table class="table table-striped table-hover shadow">
    <thead class="table-dark">
        <tr>
            <th>ชื่อ</th>
            <th>ราคา</th>
            <th>ประเภท</th>
            <th>จัดการ</th>
        </tr>
    </thead>

    <tbody>
    {% for m in menus %}
        <tr>
            <td>{{ m.name }}</td>
            <td>{{ m.price }} บาท</td>
            <td>{{ m.category }}</td>
            <td>
                <a href="/edit/{{ m.id }}" class="btn btn-warning btn-sm">แก้ไข</a>
                <a href="/delete/{{ m.id }}" class="btn btn-danger btn-sm">ลบ</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
